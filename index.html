<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="color-scheme" content="dark" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>osu!storyboard player</title>
    </head>

    <body>
        <div id="app" class="show">
            <div class="menu-backdrop"></div>
            <div class="menu" data-mode="difficulty">
                <span id="menu-title">Select difficulty</span>
                <div class="menu-content">
                    <div id="difficulty-dialog" class="menu-diff-section">
                        <div class="menu-diff-selector">
                            <div class="diff-item is-empty">
                                <span class="diff-name">Please load an `.osz` file</span>
                            </div>
                        </div>
                    </div>
                    <div id="loading-state" class="loading-state">
                        <div class="loading-state__header">
                            <span>Loading storyboard assets</span>
                            <span id="loading-percent">0%</span>
                        </div>
                        <div class="loading-state__bar">
                            <div id="loading-progress-fill" class="loading-state__bar-fill"></div>
                        </div>
                        <span id="loading-current-file" class="loading-state__file">Waiting for load...</span>
                    </div>
                </div>
            </div>
            <div class="bar header">
                <span id="status-text">Initializing assets, please wait...</span>
                <span class="title"
                    >osu!storyboard player by michioxd
                    <a
                        href="https://github.com/michioxd/osbplayer/commit/%VITE_GIT_COMMIT_FULL%"
                        target="_blank"
                        id="git-hash"
                        title="Build date: %VITE_BUILD_DATE% (%VITE_BUILD_TIME%) - Git commit hash: %VITE_GIT_COMMIT_FULL%"
                        >%VITE_GIT_CURRENT_BRANCH%.%VITE_GIT_COMMIT%</a
                    >
                    <a href="https://github.com/michioxd/osbplayer" target="_blank">fork me on github</a>
                </span>
            </div>
            <div class="bar controls">
                <button id="play-pause">
                    <i class="ti ti-control-play"></i>
                </button>
                <button id="stop-all" title="Stop playback" aria-label="Stop playback">
                    <i class="ti ti-control-stop"></i>
                </button>
                <div class="time-display">
                    <span id="current-time">00:00</span>
                </div>
                <div class="progress-bar" id="progress-bar">
                    <div id="progress" class="progress"></div>
                    <div id="progress-handle" class="progress-handle"></div>
                </div>
                <div class="time-display">
                    <span id="total-time">00:00</span>
                </div>
                <button id="open-file" title="Open .osz file" aria-label="Open .osz file">
                    <i class="ti ti-zip"></i>
                </button>
                <button id="show-menu" title="Select difficulty" aria-label="Select difficulty">
                    <i class="ti ti-menu"></i>
                </button>
                <button id="fullscreen-toggle">
                    <i class="ti ti-fullscreen"></i>
                </button>
            </div>
            <div id="storyboard-host">
                <canvas id="storyboard"></canvas>
            </div>
        </div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
