  <body>
    <div id="app" class="show hide_menu">
      <div class="menu-backdrop"></div>
      <div class="menu" data-mode="difficulty">
        <span id="menu-title">Select difficulty</span>
        <div class="menu-content">
          <div id="difficulty-dialog" class="menu-diff-section">
            <div class="menu-diff-selector">
              <div class="diff-item is-empty">
                <span class="diff-name">Please load an `.osz` file</span>
              </div>
            </div>
          </div>
          <div id="loading-state" class="loading-state">
            <div class="loading-state__header">
              <span>Loading storyboard assets</span>
              <span id="loading-percent">0%</span>
            </div>
            <div class="loading-state__bar">
              <div
                id="loading-progress-fill"
                class="loading-state__bar-fill"
              ></div>
            </div>
            <span id="loading-current-file" class="loading-state__file"
              >Waiting for load...</span
            >
          </div>
        </div>
      </div>
      <div class="bar header">
        <span id="status-text">Initializing assets, please wait...</span>
        <span class="title"
          >osu!storyboard player by michioxd
          <a
            href="https://github.com/michioxd/osbplayer/commit/1e6fff32653a0f1e27633aa494005711f0fc1ff4"
            target="_blank"
            id="git-hash"
            title="Build date: 2026-03-30T16:37:17.606Z (1774888637606) - Git commit hash: 1e6fff32653a0f1e27633aa494005711f0fc1ff4"
            >main.1e6fff3</a
          >
          <a href="https://github.com/michioxd/osbplayer" target="_blank"
            >fork me on github</a
          ></span
        >
      </div>
      <div class="bar controls">
        <button id="play-pause"><i class="fa-solid fa-play"></i></button>
        <button id="stop-all" title="Stop playback" aria-label="Stop playback">
          <i class="fa-solid fa-stop"></i>
        </button>
        <div class="time-display">
          <span id="current-time">00:00</span> <span>/</span>
          <span id="total-time">00:00</span>
        </div>
        <div class="progress-bar" id="progress-bar">
          <div id="progress" class="progress"></div>
          <div id="progress-handle" class="progress-handle"></div>
        </div>
        <div class="spacing"></div>
        <button
          id="open-file"
          title="Open .osz file"
          aria-label="Open .osz file"
        >
          <i class="fa-solid fa-folder-open"></i>
        </button>
        <button
          id="show-menu"
          title="Select difficulty"
          aria-label="Select difficulty"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
        <div id="settings-menu" class="settings-menu">
          <button
            id="toggle-settings-menu"
            title="Open settings"
            aria-label="Open settings"
            aria-haspopup="menu"
            aria-controls="settings-panel"
            aria-expanded="false"
          >
            <i class="fa-solid fa-gear"></i>
          </button>
          <div id="settings-panel" class="settings-panel" role="menu" hidden="">
            <div id="settings-view-main" class="settings-view">
              <button
                id="toggle-fixed-controls"
                class="settings-item"
                title="Pin controls UI"
                aria-label="Toggle fixed controls UI"
                aria-pressed="false"
              >
                <span class="settings-item__icon" aria-hidden="true"
                  ><i class="fa-solid fa-thumbtack"></i> </span
                ><span class="settings-item__content"
                  ><span class="settings-item__label">Pin controls UI</span>
                  <span class="settings-item__description"
                    >Keep the top and bottom bars visible</span
                  > </span
                ><span
                  id="toggle-fixed-controls-value"
                  class="settings-item__value"
                  >Off</span
                >
              </button>
              <button
                id="toggle-layout-borders"
                class="settings-item"
                title="Show layout borders"
                aria-label="Toggle layout borders"
                aria-pressed="false"
              >
                <span class="settings-item__icon" aria-hidden="true"
                  ><i class="fa-solid fa-border-all"></i> </span
                ><span class="settings-item__content"
                  ><span class="settings-item__label">Layout borders</span>
                  <span class="settings-item__description"
                    >Show the storyboard frame guides</span
                  > </span
                ><span
                  id="toggle-layout-borders-value"
                  class="settings-item__value"
                  >Off</span
                >
              </button>
              <button
                id="toggle-layout-border-labels"
                class="settings-item"
                title="Hide layout border labels"
                aria-label="Toggle layout border labels"
                aria-pressed="true"
              >
                <span class="settings-item__icon" aria-hidden="true"
                  ><i class="fa-solid fa-tag"></i> </span
                ><span class="settings-item__content"
                  ><span class="settings-item__label">Border labels</span>
                  <span class="settings-item__description"
                    >Show labels for each layout border</span
                  > </span
                ><span
                  id="toggle-layout-border-labels-value"
                  class="settings-item__value"
                  >On</span
                >
              </button>
              <button
                id="toggle-renderer-backend"
                class="settings-item"
                title="Switch renderer backend"
                aria-label="Switch renderer backend"
              >
                <span class="settings-item__icon" aria-hidden="true"
                  ><i class="fa-solid fa-microchip"></i> </span
                ><span class="settings-item__content"
                  ><span class="settings-item__label">Renderer backend</span>
                  <span class="settings-item__description"
                    >Cycle between WebGPU, WebGL, and Canvas</span
                  > </span
                ><span
                  id="toggle-renderer-backend-value"
                  class="settings-item__value"
                  >GPU</span
                >
              </button>
              <button
                id="toggle-resolution"
                class="settings-item"
                title="Change rendering resolution"
                aria-label="Change rendering resolution"
                aria-haspopup="menu"
                aria-controls="settings-view-resolution"
                aria-expanded="false"
              >
                <span class="settings-item__icon" aria-hidden="true"
                  ><i class="fa-solid fa-display"></i> </span
                ><span class="settings-item__content"
                  ><span class="settings-item__label">Resolution</span>
                  <span class="settings-item__description"
                    >Auto resize or choose 144p up to 4K</span
                  > </span
                ><span class="settings-item__meta"
                  ><span
                    id="toggle-resolution-value"
                    class="settings-item__value"
                    >Auto</span
                  >
                  <span class="settings-item__chevron" aria-hidden="true"
                    ><i class="fa-solid fa-chevron-right"></i></span
                ></span>
              </button>
              <button
                id="toggle-stats"
                class="settings-item"
                title="Show stats overlay"
                aria-label="Toggle stats overlay"
                aria-pressed="false"
              >
                <span class="settings-item__icon" aria-hidden="true"
                  ><i class="fa-solid fa-chart-column"></i> </span
                ><span class="settings-item__content"
                  ><span class="settings-item__label">Stats overlay</span>
                  <span class="settings-item__description"
                    >Display render and playback diagnostics</span
                  > </span
                ><span id="toggle-stats-value" class="settings-item__value"
                  >Off</span
                >
              </button>
            </div>
            <div id="settings-view-resolution" class="settings-view" hidden="">
              <button
                id="settings-resolution-back"
                class="settings-item settings-nav-item"
                title="Back to settings"
                aria-label="Back to settings"
              >

                  ><i class="fa-solid fa-chevron-left"></i> </span
                ><span class="settings-item__content"
                  ><span class="settings-item__label">Resolution</span>
                  <span class="settings-item__description"
                    >Choose the internal render resolution</span
                  ></span
                >
              </button>
              <div
                id="settings-resolution-list"
                class="settings-resolution-list"
                role="menu"
              ></div>
            </div>
          </div>
        </div>
        <button id="fullscreen-toggle">
          <i class="fa-solid fa-expand"></i>
        </button>
      </div>
      <div id="storyboard-host"><canvas id="storyboard"></canvas></div>
