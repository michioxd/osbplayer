<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="dark light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>osu!storyboard player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-size: 12px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    body {
      background-color: #000;
      color: #eee;
    }

    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    .header {
      display: flex;
      flex-direction: row;
      align-items: center;
      border-bottom: 1px solid #181818;
      background: #101010;
      width: 100%;
      padding: 1rem;
      gap: 1rem;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      overflow: auto;
      zoom: 0.6;
    }

    button {
      background: #181818;
      border: 1px solid #222;
      color: #eee;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
    }

    .controls {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 100%;
      padding: 1rem;
      gap: 1rem;
      background: #101010;
      border-top: 1px solid #181818;
    }

    .seek-bar {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 100%;
      height: 10px;
      background: #222;
      position: relative;
    }

    .seek-bar-fill {
      background: #333;
      height: 100%;
      width: 0%;
    }

    .seek-bar-handle {
      background: #7e7e7e;
      height: 100%;
      position: absolute;
      left: 0;
      width: 7px;
      cursor: pointer;
    }

    .time-display {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: fit-content;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="main">
    <div class="header">
      <p>
        Select an .osz file to play
      </p>
      <input type="file" id="fileInput" accept=".osz" />
      <select id="difficultySelect">
        <option class="placeholder" value="" disabled selected>Difficulty</option>
      </select>
      <p>Assets: <span id="loadingAssets">0</span>/<span id="totalAssets">0</span></p>
      <p>osu!storyboard player by michioxd - very very under development</p>
    </div>
    <div class="content">
      <canvas id="canvas"></canvas>
    </div>
    <div class="controls">
      <button id="playButton">Play</button>
      <div class="seek-bar" id="seekBar">
        <div class="seek-bar-fill" id="seekBarFill"></div>
        <div class="seek-bar-handle" id="seekBarHandle"></div>
      </div>
      <div class="time-display">
        <span id="currentTime">00:00</span>
        <span>/</span>
        <span id="totalTime">00:00</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
