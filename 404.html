  <body>
    <div id="app" class="show hide_menu">
      <div class="menu-backdrop"></div>
      <div class="menu" data-mode="difficulty">
        <span id="menu-title">Select difficulty</span>
        <div class="menu-content">
          <div id="difficulty-dialog" class="menu-diff-section">
            <div class="menu-diff-selector">
              <div class="diff-item is-empty">
                <span class="diff-name">Please load an `.osz` file</span>
              </div>
            </div>
          </div>
          <div id="loading-state" class="loading-state">
            <div class="loading-state__header">
              <span>Loading storyboard assets</span>
              <span id="loading-percent">0%</span>
            </div>
            <div class="loading-state__bar">
              <div
                id="loading-progress-fill"
                class="loading-state__bar-fill"
              ></div>
            </div>
            <span id="loading-current-file" class="loading-state__file"
              >Waiting for load...</span
            >
          </div>
        </div>
      </div>
      <div class="bar header">
        <span id="status-text">Initializing assets, please wait...</span>
        <span class="title"
          >osu!storyboard player by michioxd
          <a
            href="https://github.com/michioxd/osbplayer/commit/3837d30a87dcaa27ec04c9363b72bc2558241eae"
            target="_blank"
            id="git-hash"
            title="Build date: 2026-03-30T10:51:08.277Z (1774867868277) - Git commit hash: 3837d30a87dcaa27ec04c9363b72bc2558241eae"
            >main.3837d30</a
          >
          <a href="https://github.com/michioxd/osbplayer" target="_blank"
            >fork me on github</a
          ></span
        >
      </div>
      <div class="bar controls">
        <button id="play-pause"><i class="ti ti-control-play"></i></button>
        <button id="stop-all" title="Stop playback" aria-label="Stop playback">
          <i class="ti ti-control-stop"></i>
        </button>
        <div class="time-display">
          <span id="current-time">00:00</span> <span>/</span>
          <span id="total-time">00:00</span>
        </div>
        <div class="progress-bar" id="progress-bar">
          <div id="progress" class="progress"></div>
          <div id="progress-handle" class="progress-handle"></div>
        </div>
        <button
          id="open-file"
          title="Open .osz file"
          aria-label="Open .osz file"
        >
          <i class="ti ti-zip"></i>
        </button>
        <button
          id="show-menu"
          title="Select difficulty"
          aria-label="Select difficulty"
        >
          <i class="ti ti-menu"></i>
        </button>
        <button
          id="toggle-fixed-controls"
          title="Pin controls UI"
          aria-label="Toggle fixed controls UI"
          aria-pressed="false"
        >
          <i class="ti ti-pin2"></i>
        </button>
        <button
          id="toggle-layout-borders"
          title="Show layout borders"
          aria-label="Toggle layout borders"
          aria-pressed="false"
        >
          <i class="ti ti-layout-grid2"></i>
        </button>
        <button
          id="toggle-layout-border-labels"
          title="Hide layout border labels"
          aria-label="Toggle layout border labels"
          aria-pressed="true"
        >
          Lb
        </button>
        <button
          id="toggle-renderer-backend"
          class="renderer-backend-button"
          title="Switch renderer backend"
          aria-label="Switch renderer backend"
        >
          GPU
        </button>
        <button
          id="toggle-stats"
          title="Show stats overlay"
          aria-label="Toggle stats overlay"
          aria-pressed="false"
        >
          <i class="ti ti-align-left"></i>
        </button>
        <button id="fullscreen-toggle"><i class="ti ti-fullscreen"></i></button>
      </div>
      <div id="storyboard-host"><canvas id="storyboard"></canvas></div>
    </div>
